# switchonai.ru — nginx security configuration
# Добавить в блок server {} в /etc/nginx/sites-available/switchonai.ru
# После изменений: sudo nginx -t && sudo nginx -s reload

# =============================================
# SECURITY HEADERS
# =============================================

add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
add_header X-XSS-Protection "1; mode=block" always;

# Content Security Policy — базовый (настроить под реальные домены)
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' *.google-analytics.com *.googletagmanager.com; style-src 'self' 'unsafe-inline' fonts.googleapis.com; font-src 'self' fonts.gstatic.com; img-src 'self' data: *.google-analytics.com *.googletagmanager.com; connect-src 'self' *.google-analytics.com;" always;

# =============================================
# СКРЫТЬ ИНФОРМАЦИЮ О СЕРВЕРЕ
# =============================================

fastcgi_hide_header X-Powered-By;
server_tokens off;

# =============================================
# ЗАКРЫТЬ XMLRPC.PHP
# =============================================

location = /xmlrpc.php {
    deny all;
    access_log off;
    log_not_found off;
    return 444;
}

# =============================================
# ЗАКРЫТЬ .htaccess И СИСТЕМНЫЕ ФАЙЛЫ
# =============================================

location ~ /\. {
    deny all;
    access_log off;
    log_not_found off;
}

location ~* /(wp-config\.php|readme\.html|license\.txt|wp-cli\.yml) {
    deny all;
    access_log off;
    log_not_found off;
}

# =============================================
# КЭШИРОВАНИЕ СТАТИКИ
# =============================================

location ~* \.(jpg|jpeg|png|gif|webp|avif|ico|svg)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
}

location ~* \.(css|js|woff|woff2|ttf|eot)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
}

# =============================================
# GZIP СЖАТИЕ
# =============================================

gzip on;
gzip_vary on;
gzip_min_length 1024;
gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml;

# =============================================
# БЛОКИРОВКА МУСОРНЫХ БОТОВ
# =============================================

# Заблокировать известных спам-ботов
if ($http_user_agent ~* (AhrefsBot|MJ12bot|DotBot|SemrushBot)) {
    return 403;
}

